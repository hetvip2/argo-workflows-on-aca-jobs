name: ci
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22.17.0", cache: npm }
      - run: npm ci
      - run: npm run check
      - run: az bicep build --file infra/main.bicep --stdout > /dev/null
      - run: docker build -t argo-workflows-on-aca-jobs:test .
