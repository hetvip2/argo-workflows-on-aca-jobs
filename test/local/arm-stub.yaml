apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm-stub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm-stub
  template:
    metadata:
      labels:
        app: arm-stub
    spec:
      containers:
        - name: arm-stub
          image: argo-aca-arm-stub:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: arm-stub
spec:
  selector:
    app: arm-stub
  ports:
    - port: 8080
      targetPort: 8080
