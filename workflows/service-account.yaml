apiVersion: v1
kind: ServiceAccount
metadata:
  name: aca-jobs-runner
  annotations:
    azure.workload.identity/client-id: REPLACE_CLIENT_ID
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aca-jobs-runner
rules:
  - apiGroups: [argoproj.io]
    resources: [workflowtaskresults]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aca-jobs-runner
subjects:
  - kind: ServiceAccount
    name: aca-jobs-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aca-jobs-runner
